<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Exchange</title>
</head>
<body>
  <ul>
  {% for error in errors %}
  <li>
    {{error}}
  </li>
  {% endfor %}
  </ul>
  <form action="/changed" method="POST">
    <p>
    Converting from 
    <input name = "convertingf">
    </p>
    <p>
    Converting to
    <input name = "convertingt">
    </p>
    <p>
    Amount
    <input name = "amount">
    </p>
    <button>Convert</button>

  </form>
  <div>
    {{symbol}}{{exchange}}
  </div>
</body>
</html>
